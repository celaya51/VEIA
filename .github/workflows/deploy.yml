name: Build & Deploy

# Compila el sitio Astro desde la rama de trabajo (astro-rebuild) y publica
# el resultado (dist/) en la rama main, que Hostinger sirve en veia.com.mx.
# No requiere secretos: usa el token integrado de GitHub Actions.

on:
  push:
    branches: [astro-rebuild]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar sitio (Astro -> dist/)
        run: npm run build

      - name: Publicar dist/ en la rama main
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: dist
          clean: true
          commit-message: "deploy: publica build de astro-rebuild [skip ci]"
